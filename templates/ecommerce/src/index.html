<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKR- Ecommerce</title>
    <link rel="icon" type="image/png" href="/src/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Cormorant Garamond for elegant serif, Montserrat for modern sans, Pinyon Script for the logo -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            copper: '#E34E35', // Exact punchy orange from the screenshot
                            dark: '#111111',
                            gray: '#f7f7f7',
                            text: '#000000',
                            muted: '#888888'
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Cormorant Garamond"', 'serif'],
                        script: ['"Pinyon Script"', 'cursive'],
                    },
                    letterSpacing: {
                        'widest-lg': '0.25em',
                        'widest-xl': '0.3em',
                    },
                    transitionTimingFunction: {
                        'premium': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>
  </head>
  <body class="bg-white font-sans text-brand-text">
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
